program: train.py

method: bayes

metric:
  name: val/loss
  goal: minimize

parameters:

  d_model:
    values: [128, 256]

  n_layers:
    values: [2, 4, 6]

  num_heads:
    values: [4, 8]

  d_ff:
    values: [256, 512, 1024]

  dropout:
    values: [0.1, 0.2, 0.3]

  warmup_steps:
    values: [2000, 4000]

  smoothing:
    values: [0.0, 0.1]

  lr_factor:
    values: [0.5, 1.0, 2.0]

  batch_size:
    value: 128

  epochs:
    value: 30

  min_freq:
    value: 2

  wandb_project:
    value: assignment-03

early_terminate:
  type: hyperband
  min_iter: 5

command:
  - ${env}
  - python3
  - ${program}
  - ${args_no_hyphens}